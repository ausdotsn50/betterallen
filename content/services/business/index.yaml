# Business Permits and Licensing Category Pages
# This file contains all the pages/services available under the Business Permits and Licensing category
# Source: Business Permits and Licensing Section Office - Allen Citizen Charter

pages:
  - name: 'Secure a business permit'
    slug: 'secure-a-business-permit'
    description: 'Apply for a new business permit to legally operate your business in Allen.'

  - name: 'Renew your business permit'
    slug: 'renew-your-business-permit'
    description: 'Renew your existing business permit to keep your business operation current and compliant.'

  - name: 'Retire or close a business operation'
    slug: 'retire-or-close-a-business-operation'
    description: 'File for business retirement or closure and obtain the necessary clearances from the Business Permits and Licensing Office.'

  - name: 'Amend business information and change ownership or location'
    slug: 'amend-business-information-and-change-ownership-or-location'
    description: 'Update business details, transfer ownership, or change your business location with the proper amendments.'

  - name: 'Request a certified true copy of your business permit'
    slug: 'request-a-certified-true-copy-of-your-business-permit'
    description: 'Obtain certified copies of your business permit for official use or documentation purposes.'

  - name: 'Get a certification of no business record'
    slug: 'get-a-certification-of-no-business-record'
    description: 'Receive an official certification stating that you have no existing business records in the municipality.'

  - name: 'Secure an occupational permit'
    slug: 'secure-an-occupational-permit'
    description: 'Apply for an occupational permit for professionals and special trades requiring this license.'
